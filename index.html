<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTFM; Projects | Weiterleitung</title>
    <meta http-equiv="refresh" content="5;url=https://discord.gg/s99vVe5tNf">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #11111b 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: #cba6f7;
        }

        p {
            font-size: 1.1rem;
            color: #a6adc8;
            margin-bottom: 25px;
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #89b4fa;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #5865F2; /* Discord Blau */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn:hover {
            background-color: #4752c4;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #6c7086;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <h1>BTFM; Projects</h1>
        <p>Du wirst in Kürze zu unserem Discord weitergeleitet...</p>
        
        <a href="https://discord.gg/s99vVe5tNf" class="btn">Direkt beitreten</a>

        <div class="footer">
            &copy; 2026 BTFM; Projects
        </div>
    </div>

</body>
</html>
